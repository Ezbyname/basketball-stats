<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NBA Stats">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#17408B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>NBA Stats Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════
   NBA COLOR SYSTEM
   Primary: #17408B (NBA Blue)
   Secondary: #C9082A (NBA Red)
   Gold: #FDB927 (Lakers/Trophy gold)
   ══════════════════════════════ */

:root {
  --nba-blue: #17408B;
  --nba-red:  #C9082A;
  --nba-gold: #FDB927;
  --nba-white:#FFFFFF;
}

/* ── DARK ── */
[data-theme="dark"] {
  --bg:        #080C14;
  --bg2:       #0D1220;
  --bg3:       #121828;
  --surface:   #161E2E;
  --surface2:  #1C2538;
  --text:      #EEF0F8;
  --text2:     #8A90B0;
  --text3:     #4A5070;
  --border:    #1E2840;
  --border2:   #253050;
  --inp:       #0A0F1C;

  --score-grad: linear-gradient(160deg,#0A1020 0%,#141E38 50%,#0A1428 100%);
  --card-grad:  linear-gradient(180deg,#151E30 0%,#101828 100%);
  --hdr-grad:   linear-gradient(180deg,#0A1020 0%,#0D1428 100%);
  --tbl-stripe: rgba(255,255,255,.025);

  --pts-bg: rgba(253,185,39,.12);  --pts-c: #FDB927;
  --reb-bg: rgba(0,180,255,.12);   --reb-c: #00B4FF;
  --ast-bg: rgba(0,210,120,.12);   --ast-c: #00D278;
  --stl-bg: rgba(180,100,255,.12); --stl-c: #B464FF;
  --blk-bg: rgba(255,140,0,.12);   --blk-c: #FF8C00;
  --to-bg:  rgba(120,130,160,.1);  --to-c:  #7882A0;
  --foul-bg:rgba(201,8,42,.14);    --foul-c:#E84060;

  --b1g: linear-gradient(160deg,#7A4800,#C87A00);
  --b2g: linear-gradient(160deg,#0A2060,#1845A0);
  --b3g: linear-gradient(160deg,#380070,#7010C0);
  --brebg: linear-gradient(160deg,#003860,#0070C0);
  --bastg: linear-gradient(160deg,#104818,#208030);
  --bstlg: linear-gradient(160deg,#300060,#6010A8);
  --bblkg: linear-gradient(160deg,#602000,#C04010);
  --btog:  linear-gradient(160deg,#141414,#2A2A2A);
  --bfoulg:linear-gradient(160deg,#480010,#A01828);
  --bundog:linear-gradient(160deg,#0A2828,#184040);
}

/* ── LIGHT ── */
[data-theme="light"] {
  --bg:        #F0F2F8;
  --bg2:       #FFFFFF;
  --bg3:       #E8EAF2;
  --surface:   #FFFFFF;
  --surface2:  #F4F6FC;
  --text:      #0A1020;
  --text2:     #50587A;
  --text3:     #A0A8C0;
  --border:    #D8DCF0;
  --border2:   #C8CEE8;
  --inp:       #F4F6FC;

  --score-grad: linear-gradient(160deg,#17408B 0%,#1A4BA0 50%,#122E70 100%);
  --card-grad:  linear-gradient(180deg,#FFFFFF 0%,#F8FAFF 100%);
  --hdr-grad:   linear-gradient(180deg,#FFFFFF 0%,#F8FAFF 100%);
  --tbl-stripe: rgba(23,64,139,.04);

  --pts-bg: rgba(180,130,0,.1);   --pts-c: #A07800;
  --reb-bg: rgba(0,100,200,.1);   --reb-c: #0060C0;
  --ast-bg: rgba(0,140,60,.1);    --ast-c: #007830;
  --stl-bg: rgba(120,40,200,.1);  --stl-c: #7028C0;
  --blk-bg: rgba(180,80,0,.1);    --blk-c: #B05000;
  --to-bg:  rgba(80,90,120,.08);  --to-c:  #505A78;
  --foul-bg:rgba(180,0,30,.1);    --foul-c:#A00018;

  --b1g: linear-gradient(160deg,#8C5200,#D48A00);
  --b2g: linear-gradient(160deg,#0C2870,#1C50B8);
  --b3g: linear-gradient(160deg,#420080,#8018D0);
  --brebg: linear-gradient(160deg,#004878,#0080D8);
  --bastg: linear-gradient(160deg,#145820,#289040);
  --bstlg: linear-gradient(160deg,#380070,#7018B8);
  --bblkg: linear-gradient(160deg,#702800,#C84818);
  --btog:  linear-gradient(160deg,#303448,#484E68);
  --bfoulg:linear-gradient(160deg,#580010,#B02030);
  --bundog:linear-gradient(160deg,#1A3848,#284E60);
}

/* ══ BASE ══ */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overscroll-behavior:none; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rubik', sans-serif;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  transition: background .3s, color .3s;
}
body[lang="en"] { direction: ltr; }

/* ══ HEADER ══ */
.hdr {
  background: var(--hdr-grad);
  border-bottom: 2px solid var(--nba-red);
  padding: 10px 14px;
  padding-top: max(10px, env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 4px 24px rgba(201,8,42,.2);
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.25rem; font-weight: 900; letter-spacing: 2px;
  color: var(--text);
}
.logo-icon { font-size: 1.4rem; }
.logo-nba {
  background: var(--nba-blue);
  color: #fff; font-size: .6rem; font-weight: 900;
  padding: 1px 5px; border-radius: 3px; letter-spacing: 1px;
  margin-inline-start: 2px; align-self: center;
}
.hdr-right { display:flex; align-items:center; gap:6px; }

/* theme toggle */
.theme-tog {
  width: 34px; height: 34px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 50%; cursor: pointer; font-size: .95rem;
  display: flex; align-items:center; justify-content:center;
  transition: all .2s;
}
.theme-tog:hover { border-color: var(--nba-gold); }

/* language toggle */
.lang-pill {
  display: flex; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 20px;
  padding: 2px; gap: 2px;
}
.lang-btn {
  border: none; background: transparent;
  color: var(--text2); padding: 4px 10px; border-radius: 16px;
  cursor: pointer; font-size: .72rem; font-family: inherit;
  font-weight: 700; letter-spacing: .5px; transition: all .2s;
}
.lang-btn.active { background: var(--nba-red); color: #fff; }

/* ══ TABS ══ */
.tab-bar {
  display: flex; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 50px; z-index: 200;
}
.tab-btn {
  flex: 1; padding: 10px 4px;
  border: none; background: transparent;
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .85rem; font-weight: 800; letter-spacing: .8px;
  cursor: pointer; text-transform: uppercase;
  border-bottom: 2.5px solid transparent;
  transition: all .2s;
}
.tab-btn.active { color: var(--text); border-bottom-color: var(--nba-gold); }

main { padding-bottom: 80px; }
.section { display: none; }
.section.active { display: block; }

/* ══ SETUP ══ */
.setup-wrap { padding: 14px; max-width: 580px; margin: 0 auto; }

.s-block {
  background: var(--card-grad);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px; margin-bottom: 14px;
  box-shadow: 0 2px 20px rgba(0,0,0,.15);
}
.s-block-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .78rem; font-weight: 900; letter-spacing: 2px;
  color: var(--nba-red); text-transform: uppercase;
  margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
}
.f-lbl { font-size: .7rem; color: var(--text2); margin-bottom: 4px; display: block; letter-spacing: .4px; }
.f-inp {
  width: 100%; padding: 10px 12px;
  background: var(--inp); border: 1.5px solid var(--border2);
  border-radius: 10px; color: var(--text); font-family: inherit; font-size: .9rem;
  margin-bottom: 12px; transition: border-color .2s;
}
.f-inp:focus { outline: none; border-color: var(--nba-blue); }
.f-inp:last-of-type { margin-bottom: 0; }

/* Players sub-header */
.pl-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.pl-count {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 10px; padding: 3px 10px;
  font-size: .7rem; font-weight: 600; color: var(--text2);
}
/* Column labels */
.p-col-labels {
  display: grid; grid-template-columns: 70px 1fr 34px;
  gap: 8px; padding: 0 2px; margin-bottom: 6px;
}
.p-col-lbl { font-size: .67rem; color: var(--text3); letter-spacing: .3px; text-align: center; }
.p-col-lbl.left { text-align: start; padding-inline-start: 4px; }

/* Player row */
.p-row {
  display: grid; grid-template-columns: 70px 1fr 34px;
  gap: 8px; margin-bottom: 8px; align-items: center;
}
.p-row .jw { width: 70px; }

/* Jersey field — unmistakable */
.jw { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.jw .hash { display: none; }
.j-inp {
  width: 70px; height: 44px; padding: 0;
  background: var(--inp);
  border: 2px solid var(--nba-gold);
  border-radius: 10px;
  color: var(--nba-gold);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 1.5rem; text-align: center;
  direction: ltr;
  transition: box-shadow .2s;
  -moz-appearance: textfield;
}
.j-inp::-webkit-inner-spin-button, .j-inp::-webkit-outer-spin-button { -webkit-appearance: none; }
.j-inp:focus { outline: none; box-shadow: 0 0 0 3px rgba(253,185,39,.3); }

.nm-inp {
  height: 44px; padding: 0 12px;
  background: var(--inp); border: 1.5px solid var(--border2);
  border-radius: 10px; color: var(--text); font-family: inherit;
  font-size: .88rem; width: 100%; transition: border-color .2s;
}
.nm-inp:focus { outline: none; border-color: var(--nba-blue); }

.del-btn {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 1rem; width: 34px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  transition: color .2s; border-radius: 8px;
}
.del-btn:hover { color: var(--nba-red); background: rgba(201,8,42,.08); }

.btn-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.btn-primary {
  background: var(--nba-red); color: #fff; border: none;
  padding: 12px 22px; border-radius: 10px; cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .95rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  box-shadow: 0 4px 16px rgba(201,8,42,.35); transition: all .15s;
}
.btn-primary:active { transform: scale(.93); box-shadow: none; }
.btn-secondary {
  background: var(--nba-blue); color: #fff; border: none;
  padding: 12px 22px; border-radius: 10px; cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .95rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  box-shadow: 0 4px 16px rgba(23,64,139,.4); transition: all .15s;
}
.btn-secondary:active { transform: scale(.93); box-shadow: none; }

/* ══ SCOREBOARD ══ */
.scoreboard {
  background: var(--score-grad);
  padding: 16px 18px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(253,185,39,.15);
  position: relative; overflow: hidden;
}
.scoreboard::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -45deg, transparent, transparent 40px,
    rgba(255,255,255,.012) 40px, rgba(255,255,255,.012) 41px
  );
  pointer-events: none;
}
.sb-team {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.35rem; font-weight: 900; letter-spacing: 1.5px;
  color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.4);
}
.sb-vs { color: rgba(255,255,255,.45); font-size: .72rem; margin-top: 3px; }
.sb-score-wrap { text-align: center; }
.sb-lbl {
  font-size: .6rem; color: rgba(255,255,255,.5);
  text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px;
}
.sb-score {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 3rem; font-weight: 900; color: var(--nba-gold); line-height: 1;
  text-shadow: 0 0 20px rgba(253,185,39,.4);
}

/* ══ PLAYER ITEMS ══ */
.player-list { padding: 10px; }
.pi {
  background: var(--card-grad);
  border: 1px solid var(--border);
  border-radius: 14px; margin-bottom: 10px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
  transition: border-color .15s;
}

@keyframes gFlash {
  0%   { border-color: #00D278; box-shadow: 0 0 0 0 rgba(0,210,120,.7); }
  40%  { border-color: #00D278; box-shadow: 0 0 0 6px rgba(0,210,120,.15); }
  100% { border-color: var(--border); box-shadow: 0 2px 12px rgba(0,0,0,.15); }
}
.pi.flash { animation: gFlash .55s ease-out forwards; }

/* Player header */
.pi-hdr {
  background: linear-gradient(90deg, rgba(23,64,139,.35), rgba(201,8,42,.1));
  padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
[data-theme="light"] .pi-hdr {
  background: linear-gradient(90deg, rgba(23,64,139,.08), rgba(201,8,42,.04));
}

.pi-badge {
  width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0;
  background: var(--nba-blue);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 1rem; color: #fff;
  border: 1.5px solid rgba(255,255,255,.15);
  box-shadow: 0 2px 8px rgba(23,64,139,.4);
}
.pi-name {
  font-weight: 600; font-size: .92rem; flex: 1;
  min-width: 0; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
/* pills */
.pi-pills { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; }
.pill {
  border-radius: 5px; padding: 2px 6px;
  display: flex; align-items: baseline; gap: 2px;
}
.pill .pv { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: .9rem; line-height: 1; }
.pill .pk { font-size: .58rem; opacity: .85; }
.pp  { background: var(--pts-bg);  color: var(--pts-c); }
.prb { background: var(--reb-bg);  color: var(--reb-c); }
.pa  { background: var(--ast-bg);  color: var(--ast-c); }
.psl { background: var(--stl-bg);  color: var(--stl-c); }
.pbk { background: var(--blk-bg);  color: var(--blk-c); }
.pto { background: var(--to-bg);   color: var(--to-c); }
.pfl { background: var(--foul-bg); color: var(--foul-c); }

/* ══ ACTION BUTTONS ══ */
.pi-acts { padding: 8px 8px 10px; }

.pts-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 7px; }
.pts-btn {
  border: none; border-radius: 12px; padding: 14px 4px 10px;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px;
  position: relative; overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,.25);
}
.pts-btn .pn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2.2rem; font-weight: 900; color: #fff; line-height: 1;
  text-shadow: 0 2px 6px rgba(0,0,0,.3);
}
.pts-btn .pl { font-size: .6rem; color: rgba(255,255,255,.7); letter-spacing: .3px; }
.b1 { background: var(--b1g); }
.b2 { background: var(--b2g); }
.b3 { background: var(--b3g); }

.sec-row  { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; margin-bottom: 5px; }
.neg-row  { display: grid; grid-template-columns: repeat(2,1fr); gap: 5px; margin-bottom: 5px; }

.act-btn {
  border: none; border-radius: 10px; padding: 10px 4px;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px;
  position: relative; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.act-btn .ai { font-size: 1.1rem; line-height: 1.1; }
.act-btn .al { font-size: .6rem; color: rgba(255,255,255,.78); text-align: center; line-height: 1.25; }

.b-reb  { background: var(--brebg); }
.b-ast  { background: var(--bastg); }
.b-stl  { background: var(--bstlg); }
.b-blk  { background: var(--bblkg); }
.b-to   { background: var(--btog); }
.b-foul { background: var(--bfoulg); }
.b-undo {
  background: var(--bundog); width: 100%;
  flex-direction: row; justify-content: center; gap: 7px;
  padding: 9px; border-radius: 10px; margin-top: 3px;
}

/* button animations */
@keyframes pop { 0%{transform:scale(1)} 32%{transform:scale(.74);filter:brightness(1.7)} 68%{transform:scale(1.08);filter:brightness(1.15)} 100%{transform:scale(1);filter:brightness(1)} }
.popping { animation: pop .25s ease-out forwards; }
.ripple  { position:absolute; border-radius:50%; background:rgba(255,255,255,.2); transform:scale(0); animation:rpl .42s linear forwards; pointer-events:none; }
@keyframes rpl { to { transform:scale(5); opacity:0; } }

/* ══ STATS TABLE ══ */
.stats-wrap { padding: 10px; }
.stats-card {
  background: var(--card-grad);
  border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,.12);
}
.tbl-hdr {
  background: linear-gradient(135deg, var(--nba-blue), #1A50A8);
  padding: 11px 16px;
  display: flex; align-items: center; gap: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: .88rem; letter-spacing: 2px;
  text-transform: uppercase; color: #fff;
}
.tbl-hdr-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--nba-gold);
  box-shadow: 0 0 6px var(--nba-gold);
}
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: .78rem; }
thead { background: rgba(23,64,139,.25); }
[data-theme="light"] thead { background: rgba(23,64,139,.1); }
th {
  padding: 8px 9px; text-align: center;
  color: var(--nba-gold); font-family: 'Barlow Condensed', sans-serif;
  font-size: .73rem; letter-spacing: .5px; white-space: nowrap; font-weight: 800;
}
td { padding: 9px 9px; text-align: center; border-top: 1px solid var(--border); white-space: nowrap; color: var(--text); }
tr:nth-child(even) td { background: var(--tbl-stripe); }
tr:hover td { background: rgba(23,64,139,.08); }
.td-name { text-align: start!important; font-weight: 600; padding-inline-start: 14px; }
.td-num  { color: var(--nba-gold); font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: .92rem; }
.td-pts  { color: var(--nba-gold); font-weight: 700; font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; }
.tfoot-row td { background: rgba(201,8,42,.07)!important; border-top: 2px solid var(--nba-red)!important; font-weight: 700; }
.stats-acts { padding: 12px; text-align: center; }
.btn-danger {
  background: linear-gradient(135deg,#48000E,#980018);
  color: #fff; border: none; padding: 11px 24px; border-radius: 10px;
  cursor: pointer; font-family: inherit; font-weight: 600; font-size: .85rem;
  box-shadow: 0 3px 12px rgba(200,0,20,.3);
}

/* ══ SHARE ══ */
.share-wrap { padding: 10px; max-width: 700px; margin: 0 auto; }
.share-card {
  background: var(--card-grad);
  border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
  margin-bottom: 10px; box-shadow: 0 2px 16px rgba(0,0,0,.12);
}
.share-hdr {
  background: linear-gradient(135deg, #480010, #900018);
  padding: 11px 16px; display: flex; align-items: center; gap: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: .88rem; letter-spacing: 2px;
  text-transform: uppercase; color: #fff;
}
.share-body { padding: 14px; overflow-x: auto; }
.sh-banner {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.sh-tname { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 900; color: var(--nba-gold); }
.sh-vs { color: var(--text2); font-size: .78rem; }
.sh-table { width: 100%; border-collapse: collapse; font-size: .74rem; }
.sh-table th { background: var(--nba-blue); color: #fff; padding: 5px 7px; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; white-space: nowrap; }
.sh-table td { padding: 5px 7px; text-align: center; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; }
.sh-table tr:nth-child(even) td { background: var(--tbl-stripe); }
.sh-pts  { color: var(--nba-gold)!important; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; }
.sh-name { text-align: start!important; font-weight: 600; }
.sh-num  { color: var(--nba-red)!important; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; }
.sh-tot td { background: rgba(201,8,42,.06)!important; font-weight: 700; border-top: 2px solid var(--nba-red)!important; }
.sh-footer { font-size: .64rem; color: var(--text2); margin-top: 8px; }
.share-btns { padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
.btn-copy { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border2); padding: 10px 18px; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: .83rem; transition: all .2s; }
.btn-copy:hover { border-color: var(--nba-blue); color: var(--nba-blue); }
.btn-wa  { background: #25D366; color: #fff; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: .83rem; }

/* ══ TOAST ══ */
#toast {
  position: fixed;
  bottom: max(22px, env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, #00A855, #00C868);
  color: #fff; padding: 10px 24px; border-radius: 24px;
  font-weight: 600; font-size: .84rem; z-index: 999;
  opacity: 0; transition: opacity .28s; pointer-events: none;
  white-space: nowrap; box-shadow: 0 4px 16px rgba(0,180,80,.35);
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="logo">
    <span class="logo-icon">🏀</span>
    <span id="app-title">STATS</span>
    <span class="logo-nba">NBA</span>
  </div>
  <div class="hdr-right">
    <button class="theme-tog" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <div class="lang-pill">
      <button class="lang-btn active" onclick="setLang('he')" id="btn-he">עב׳</button>
      <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
    </div>
  </div>
</header>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('setup')" id="tab-setup">הגדרות</button>
  <button class="tab-btn" onclick="showTab('game')"  id="tab-game">משחק</button>
  <button class="tab-btn" onclick="showTab('stats')" id="tab-stats">סטטיסטיקה</button>
  <button class="tab-btn" onclick="showTab('share')" id="tab-share">שיתוף</button>
</div>

<main>
<!-- ══ SETUP ══ -->
<div id="sec-setup" class="section active">
<div class="setup-wrap">
  <div class="s-block">
    <div class="s-block-title">🏆 <span id="lbl-ti">פרטי קבוצה</span></div>
    <label class="f-lbl" id="lbl-tn">שם הקבוצה</label>
    <input class="f-inp" type="text" id="team-name" placeholder="לדוגמה: ניר עציון"/>
    <label class="f-lbl" id="lbl-op">יריבה (אופציונלי)</label>
    <input class="f-inp" type="text" id="opp-name" placeholder="שם היריבה"/>
  </div>
  <div class="s-block">
    <div class="pl-header">
      <div class="s-block-title" style="margin-bottom:0">👕 <span id="lbl-pl">שחקנים</span></div>
      <div class="pl-count" id="pl-count">0 / 15</div>
    </div>
    <div class="p-col-labels" style="margin-top:12px" id="col-labels">
      <span class="p-col-lbl" id="col-j">מספר חולצה</span>
      <span class="p-col-lbl left" id="col-n">שם שחקן</span>
      <span class="p-col-lbl"></span>
    </div>
    <div id="players-container"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="addPlayerRow()" id="btn-add">+ הוסף שחקן</button>
      <button class="btn-secondary" onclick="startGame()" id="btn-start">🏀 התחל</button>
    </div>
  </div>
</div>
</div>

<!-- ══ GAME ══ -->
<div id="sec-game" class="section">
  <div class="scoreboard">
    <div>
      <div class="sb-team" id="sb-team">קבוצה</div>
      <div class="sb-vs" id="sb-vs"></div>
    </div>
    <div class="sb-score-wrap">
      <div class="sb-lbl" id="lbl-total">נקודות</div>
      <div class="sb-score" id="total-score">0</div>
    </div>
  </div>
  <div class="player-list" id="player-list"></div>
</div>

<!-- ══ STATS ══ -->
<div id="sec-stats" class="section">
<div class="stats-wrap">
  <div class="stats-card">
    <div class="tbl-hdr"><div class="tbl-hdr-dot"></div><span id="stats-title">סטטיסטיקה קבוצתית</span></div>
    <div class="tbl-wrap">
      <table><thead><tr id="stats-head"></tr></thead><tbody id="stats-body"></tbody></table>
    </div>
  </div>
  <div class="stats-acts">
    <button class="btn-danger" onclick="resetGame()" id="btn-reset">🔄 איפוס משחק</button>
  </div>
</div>
</div>

<!-- ══ SHARE ══ -->
<div id="sec-share" class="section">
<div class="share-wrap">
  <div class="share-card">
    <div class="share-hdr">📤 <span id="lbl-share">שתף תוצאות</span></div>
    <div class="share-body" id="share-inner"></div>
  </div>
  <div class="share-btns">
    <button class="btn-copy" onclick="copyStats()" id="btn-copy">📋 העתק</button>
    <button class="btn-wa"   onclick="shareWa()"   id="btn-wa">📱 WhatsApp</button>
  </div>
</div>
</div>
</main>

<div id="toast"></div>

<script>
/* ── STATE ── */
let lang = 'he', players = [], history = [], playerCount = 0;
let theme = localStorage.getItem('nba-theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);
document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀️' : '🌙';

function toggleTheme(){
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('nba-theme', theme);
}

/* ── TRANSLATIONS ── */
const T = {
  he:{
    appTitle:'STATS',
    tabs:['הגדרות','משחק','סטטיסטיקה','שיתוף'],
    ti:'פרטי קבוצה', pl:'שחקנים', tn:'שם הקבוצה', op:'יריבה (אופציונלי)',
    ph_t:'לדוגמה: ניר עציון', ph_o:'שם היריבה', ph_n:'שם שחקן...',
    colJ:'מספר חולצה', colN:'שם שחקן',
    add:'+ הוסף שחקן', start:'🏀 התחל', total:'נקודות', vs:'מול',
    a1:'1 נק׳', a2:'2 נק׳', a3:'3 נק׳',
    reb:'ריבאונד', ast:'אסיסט', stl:'חטיפה', blk:'גגות', to:'איבוד', foul:'עבירה', undo:'בטל',
    th:['#','שחקן','נק׳','1פ','2פ','3פ','רי','אס','חט','גג','אי','עב'],
    sth:['#','שחקן','נק׳','1פ','2פ','3פ','רי','אס','חט','גג','אי','עב'],
    reset:'🔄 איפוס', share:'שתף תוצאות', copy:'📋 העתק', wa:'📱 WhatsApp',
    copied:'הועתק!', myteam:'הקבוצה שלי', footer:'📊 NBA Stats Tracker',
    tot:'סה״כ', undone:'בוטל', stTitle:'סטטיסטיקה קבוצתית',
    PTS:'נק׳',REB:'רי',AST:'אס',STL:'חט',BLK:'גג',TO:'אי',FL:'עב',
  },
  en:{
    appTitle:'STATS',
    tabs:['Setup','Game','Stats','Share'],
    ti:'Team Info', pl:'Players', tn:'Team Name', op:'Opponent (optional)',
    ph_t:'e.g. City Bulls', ph_o:'Opponent name', ph_n:'Player name...',
    colJ:'Jersey #', colN:'Player Name',
    add:'+ Add Player', start:'🏀 Start', total:'Points', vs:'vs',
    a1:'1 Pt', a2:'2 Pts', a3:'3 Pts',
    reb:'Rebound', ast:'Assist', stl:'Steal', blk:'Block', to:'Turnover', foul:'Foul', undo:'Undo',
    th:['#','Player','PTS','1P','2P','3P','REB','AST','STL','BLK','TO','F'],
    sth:['#','Player','PTS','1P','2P','3P','REB','AST','STL','BLK','TO','F'],
    reset:'🔄 Reset', share:'Share Results', copy:'📋 Copy', wa:'📱 WhatsApp',
    copied:'Copied!', myteam:'My Team', footer:'📊 NBA Stats Tracker',
    tot:'Total', undone:'Undone', stTitle:'Team Stats',
    PTS:'PTS',REB:'REB',AST:'AST',STL:'STL',BLK:'BLK',TO:'TO',FL:'F',
  }
};

/* ── LANG ── */
function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.body.lang = l;
  document.documentElement.dir = l === 'he' ? 'rtl' : 'ltr';
  document.getElementById('btn-he').classList.toggle('active', l==='he');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  applyLang(); rebuildGame(); renderStats(); renderShare();
}
function applyLang(){
  const t = T[lang];
  const m = {
    'app-title':t.appTitle, 'tab-setup':t.tabs[0], 'tab-game':t.tabs[1],
    'tab-stats':t.tabs[2],  'tab-share':t.tabs[3],
    'lbl-ti':t.ti, 'lbl-pl':t.pl, 'lbl-tn':t.tn, 'lbl-op':t.op,
    'lbl-total':t.total, 'lbl-share':t.share,
    'btn-add':t.add, 'btn-start':t.start, 'btn-reset':t.reset,
    'btn-copy':t.copy, 'btn-wa':t.wa, 'stats-title':t.stTitle,
    'col-j':t.colJ, 'col-n':t.colN,
  };
  Object.entries(m).forEach(([id,v]) => { const el = document.getElementById(id); if(el) el.textContent = v; });
  const tn = document.getElementById('team-name'); if(tn) tn.placeholder = t.ph_t;
  const on = document.getElementById('opp-name');  if(on) on.placeholder = t.ph_o;
  document.querySelectorAll('.nm-inp').forEach(el => el.placeholder = t.ph_n);
}
function showTab(name){
  ['setup','game','stats','share'].forEach(k => {
    document.getElementById('sec-'+k).classList.toggle('active', k===name);
    document.getElementById('tab-'+k).classList.toggle('active', k===name);
  });
  if(name==='stats') renderStats();
  if(name==='share') renderShare();
}
function updCount(){ const b = document.getElementById('pl-count'); if(b) b.textContent = playerCount + ' / 15'; }

/* ── SETUP ── */
function addPlayerRow(){
  if(playerCount >= 15) return;
  const c = document.getElementById('players-container');
  const d = document.createElement('div'); d.className = 'p-row';
  d.innerHTML = `
    <div class="jw">
      <span class="hash">#</span>
      <input class="j-inp" type="number" placeholder="00" min="0" max="99" inputmode="numeric"/>
    </div>
    <input class="nm-inp" type="text" placeholder="${T[lang].ph_n}"/>
    <button class="del-btn" onclick="this.closest('.p-row').remove();playerCount--;updCount();">✕</button>`;
  c.appendChild(d); playerCount++; updCount();
  d.querySelector('.nm-inp').focus();
}
function startGame(){
  players = [];
  document.querySelectorAll('.p-row').forEach(r => {
    const num = r.querySelector('.j-inp').value.trim();
    const name = r.querySelector('.nm-inp').value.trim();
    if(name) players.push({num:num||'?',name,pts:0,p1:0,p2:0,p3:0,reb:0,ast:0,stl:0,blk:0,to:0,foul:0});
  });
  if(!players.length){ alert(lang==='he'?'הוסף לפחות שחקן אחד':'Add at least one player'); return; }
  history = [];
  const tn = document.getElementById('team-name').value || T[lang].myteam;
  const op = document.getElementById('opp-name').value;
  document.getElementById('sb-team').textContent = tn;
  document.getElementById('sb-vs').textContent = op ? T[lang].vs + ' ' + op : '';
  rebuildGame(); updateTotal(); showTab('game');
}

/* ── GAME ── */
function rebuildGame(){
  const list = document.getElementById('player-list'); list.innerHTML = '';
  players.forEach((_,i) => list.appendChild(buildItem(i)));
}
function buildItem(i){
  const p = players[i], t = T[lang];
  const div = document.createElement('div'); div.className = 'pi'; div.id = 'pi-'+i;
  div.innerHTML = `
    <div class="pi-hdr">
      <div class="pi-badge">${p.num}</div>
      <div class="pi-name">${p.name}</div>
      <div class="pi-pills" id="pills-${i}"></div>
    </div>
    <div class="pi-acts">
      <div class="pts-row">
        <button class="pts-btn b1" onclick="addStat(${i},'p1',1,1)"><span class="pn">1</span><span class="pl">${t.a1}</span></button>
        <button class="pts-btn b2" onclick="addStat(${i},'p2',1,2)"><span class="pn">2</span><span class="pl">${t.a2}</span></button>
        <button class="pts-btn b3" onclick="addStat(${i},'p3',1,3)"><span class="pn">3</span><span class="pl">${t.a3}</span></button>
      </div>
      <div class="sec-row">
        <button class="act-btn b-reb" onclick="addStat(${i},'reb',1,0)"><span class="ai">💪</span><span class="al">${t.reb}</span></button>
        <button class="act-btn b-ast" onclick="addStat(${i},'ast',1,0)"><span class="ai">🎯</span><span class="al">${t.ast}</span></button>
        <button class="act-btn b-stl" onclick="addStat(${i},'stl',1,0)"><span class="ai">🫴</span><span class="al">${t.stl}</span></button>
        <button class="act-btn b-blk" onclick="addStat(${i},'blk',1,0)"><span class="ai">🛡️</span><span class="al">${t.blk}</span></button>
      </div>
      <div class="neg-row">
        <button class="act-btn b-to"   onclick="addStat(${i},'to',1,0)"><span class="ai">😬</span><span class="al">${t.to}</span></button>
        <button class="act-btn b-foul" onclick="addStat(${i},'foul',1,0)"><span class="ai">✋</span><span class="al">${t.foul}</span></button>
      </div>
      <button class="act-btn b-undo" onclick="undoLast(${i})"><span class="ai">↩️</span><span class="al" style="font-size:.7rem">${t.undo}</span></button>
    </div>`;
  updatePills(i); return div;
}
function updatePills(i){
  const p = players[i], t = T[lang], el = document.getElementById('pills-'+i); if(!el) return;
  const defs = [
    {v:p.pts,k:t.PTS,c:'pp'},{v:p.reb,k:t.REB,c:'prb'},
    {v:p.ast,k:t.AST,c:'pa'},{v:p.stl,k:t.STL,c:'psl'},
    {v:p.blk,k:t.BLK,c:'pbk'},{v:p.to,k:t.TO,c:'pto'},
    {v:p.foul,k:t.FL,c:'pfl'},
  ];
  el.innerHTML = defs.filter(d=>d.v>0).map(d=>`<div class="pill ${d.c}"><span class="pv">${d.v}</span><span class="pk">${d.k}</span></div>`).join('');
}
function addStat(i,stat,delta,pts){
  const snap = {...players[i]};
  players[i][stat] += delta; players[i].pts += pts;
  history.push({i,snap}); updatePills(i); updateTotal();
  const el = document.getElementById('pi-'+i);
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
  el.addEventListener('animationend', ()=>el.classList.remove('flash'), {once:true});
}
document.addEventListener('click', e => {
  const btn = e.target.closest('.pts-btn,.act-btn'); if(!btn) return;
  btn.classList.remove('popping'); void btn.offsetWidth; btn.classList.add('popping');
  btn.addEventListener('animationend', ()=>btn.classList.remove('popping'), {once:true});
  const r = document.createElement('span'); r.className = 'ripple';
  const sz = Math.max(btn.offsetWidth, btn.offsetHeight);
  r.style.cssText = `width:${sz}px;height:${sz}px;left:${btn.offsetWidth/2-sz/2}px;top:${btn.offsetHeight/2-sz/2}px`;
  btn.appendChild(r); setTimeout(()=>r.remove(), 450);
});
function undoLast(i){
  for(let h=history.length-1;h>=0;h--){
    if(history[h].i===i){ players[i]={...history[h].snap}; history.splice(h,1); updatePills(i); updateTotal(); showToast('↩️ '+T[lang].undone); return; }
  }
}
function updateTotal(){ document.getElementById('total-score').textContent = players.reduce((s,p)=>s+p.pts,0); }
function totals(){ return players.reduce((a,p)=>({pts:a.pts+p.pts,p1:a.p1+p.p1,p2:a.p2+p.p2,p3:a.p3+p.p3,reb:a.reb+p.reb,ast:a.ast+p.ast,stl:a.stl+p.stl,blk:a.blk+p.blk,to:a.to+p.to,foul:a.foul+p.foul}),{pts:0,p1:0,p2:0,p3:0,reb:0,ast:0,stl:0,blk:0,to:0,foul:0}); }

/* ── STATS ── */
function renderStats(){
  const t = T[lang];
  document.getElementById('stats-head').innerHTML = t.th.map(h=>`<th>${h}</th>`).join('');
  const body = document.getElementById('stats-body'); body.innerHTML = '';
  [...players].sort((a,b)=>b.pts-a.pts).forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="td-num">${p.num}</td><td class="td-name">${p.name}</td><td class="td-pts">${p.pts}</td><td>${p.p1}</td><td>${p.p2}</td><td>${p.p3}</td><td>${p.reb}</td><td>${p.ast}</td><td>${p.stl}</td><td>${p.blk}</td><td>${p.to}</td><td>${p.foul}</td>`;
    body.appendChild(tr);
  });
  const tot = totals();
  const tf = document.createElement('tr'); tf.className = 'tfoot-row';
  tf.innerHTML = `<td colspan="2" class="td-name" style="color:var(--nba-gold)">${t.tot}</td><td class="td-pts">${tot.pts}</td><td>${tot.p1}</td><td>${tot.p2}</td><td>${tot.p3}</td><td>${tot.reb}</td><td>${tot.ast}</td><td>${tot.stl}</td><td>${tot.blk}</td><td>${tot.to}</td><td>${tot.foul}</td>`;
  body.appendChild(tf);
}

/* ── SHARE ── */
function renderShare(){
  const t = T[lang], tn = document.getElementById('team-name').value || T[lang].myteam;
  const op = document.getElementById('opp-name').value, tot = totals();
  const rows = [...players].sort((a,b)=>b.pts-a.pts).map(p=>`<tr><td class="sh-num">${p.num}</td><td class="sh-name">${p.name}</td><td class="sh-pts">${p.pts}</td><td>${p.p1}</td><td>${p.p2}</td><td>${p.p3}</td><td>${p.reb}</td><td>${p.ast}</td><td>${p.stl}</td><td>${p.blk}</td><td>${p.to}</td><td>${p.foul}</td></tr>`).join('');
  document.getElementById('share-inner').innerHTML = `
    <div class="sh-banner"><span style="font-size:1.3rem">🏀</span><span class="sh-tname">${tn}</span>${op?`<span class="sh-vs">${T[lang].vs} ${op}</span>`:''}</div>
    <table class="sh-table" dir="${lang==='he'?'rtl':'ltr'}">
      <thead><tr>${t.sth.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows}<tr class="sh-tot"><td colspan="2" class="sh-name" style="color:var(--nba-gold)">${t.tot}</td><td class="sh-pts">${tot.pts}</td><td>${tot.p1}</td><td>${tot.p2}</td><td>${tot.p3}</td><td>${tot.reb}</td><td>${tot.ast}</td><td>${tot.stl}</td><td>${tot.blk}</td><td>${tot.to}</td><td>${tot.foul}</td></tr></tbody>
    </table>
    <div class="sh-footer">${T[lang].footer}</div>`;
}
function buildShareText(){
  const t=T[lang],isHe=lang==='he',tn=document.getElementById('team-name').value||T[lang].myteam,op=document.getElementById('opp-name').value;
  const cols=isHe?['#','שם','נק','1פ','2פ','3פ','רי','אס','חט','גג','אי','עב']:['#','Name','PTS','1P','2P','3P','REB','AST','STL','BLK','TO','F'];
  const dR=[...players].sort((a,b)=>b.pts-a.pts).map(p=>[p.num,p.name.substring(0,9),p.pts,p.p1,p.p2,p.p3,p.reb,p.ast,p.stl,p.blk,p.to,p.foul]);
  const tot=totals(),tR=[t.tot,'',tot.pts,tot.p1,tot.p2,tot.p3,tot.reb,tot.ast,tot.stl,tot.blk,tot.to,tot.foul];
  const all=[cols,...dR,tR];
  const W=cols.map((_,ci)=>Math.max(...all.map(r=>String(r[ci]).length)));
  const pad=(v,w)=>String(v).padEnd(w);
  const row=r=>'|'+W.map((w,ci)=>` ${pad(r[ci],w)} `).join('|')+'|';
  const line=()=>'+'+W.map(w=>'-'.repeat(w+2)).join('+')+'+';
  let txt=`🏀 ${tn}`;if(op)txt+=`\n${isHe?'מול':'vs'}: ${op}`;
  txt+='\n\n'+line()+'\n'+row(cols)+'\n'+line()+'\n';
  dR.forEach(r=>{txt+=row(r)+'\n';});
  txt+=line()+'\n'+row(tR)+'\n'+line()+'\n'+T[lang].footer;
  return txt;
}
function copyStats(){
  const text=buildShareText();
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>showToast('📋 '+T[lang].copied));}
  else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('📋 '+T[lang].copied);}
}
function shareWa(){ window.open('https://wa.me/?text='+encodeURIComponent(buildShareText()),'_blank'); }
function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200); }
function resetGame(){
  if(!confirm(lang==='he'?'לאפס את כל הנתונים?':'Reset all data?')) return;
  players.forEach(p=>{p.pts=p.p1=p.p2=p.p3=p.reb=p.ast=p.stl=p.blk=p.to=p.foul=0;});
  history=[]; rebuildGame(); updateTotal(); showTab('game');
}

for(let i=0;i<5;i++) addPlayerRow();
applyLang();
if('serviceWorker' in navigator) window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js'));
</script>
